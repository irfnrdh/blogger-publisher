name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Wajib untuk otentikasi NPM Provenance (OIDC)
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Publish to NPM with Provenance
        run: npm publish --provenance
        env:
          # NODE_AUTH_TOKEN usually provided by NPM_TOKEN secret, 
          # but OIDC handles this automatically if publisher is trusted!
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
